{{ define "index.html" }}
<main class="shell">
  <section class="input-pane" aria-labelledby="check-heading">
    <div class="brand">
      <h1 id="check-heading">SpecCritic</h1>
      <p>Specification review</p>
    </div>
    <form method="post" action="/checks" enctype="multipart/form-data" hx-post="/checks" hx-target="#status">
      <input type="hidden" name="csrf_token" value="{{ .Nonce }}">

      <fieldset class="model-picker" aria-labelledby="model-picker-heading">
        <legend id="model-picker-heading">Model</legend>
        <div class="field">
          <label for="llm_provider">Provider</label>
          <select id="llm_provider" name="llm_provider">
            <option value="anthropic" data-default-model="claude-sonnet-4-20250514" {{ if eq .ModelProvider "anthropic" }}selected{{ end }}>Anthropic</option>
            <option value="openai" data-default-model="gpt-4o" {{ if eq .ModelProvider "openai" }}selected{{ end }}>OpenAI</option>
            <option value="gemini" data-default-model="gemini-2.0-flash" {{ if eq .ModelProvider "gemini" }}selected{{ end }}>Gemini</option>
          </select>
        </div>
        <div class="field">
          <label for="llm_model">Model</label>
          <input id="llm_model" name="llm_model" type="text" value="{{ .ModelName }}" autocomplete="off" maxlength="120" required aria-controls="model_options" aria-expanded="false">
          <div id="model_options" class="model-menu" role="listbox" hidden></div>
          <p id="model_picker_status" class="field-status" aria-live="polite"></p>
        </div>
      </fieldset>

      <div class="field">
        <label for="spec_file">Spec file</label>
        <input id="spec_file" name="spec_file" type="file" accept=".md,.txt,text/markdown,text/plain" required>
      </div>

      <details class="advanced-options">
        <summary>Incremental rerun</summary>
        <div class="field">
          <label for="previous_result">Previous JSON result</label>
          <input id="previous_result" name="previous_result" type="file" accept=".json,application/json">
        </div>
        <div class="field">
          <label for="incremental_base_file">Previous spec file</label>
          <input id="incremental_base_file" name="incremental_base_file" type="file" accept=".md,.txt,text/markdown,text/plain">
        </div>
        <div class="field">
          <label for="incremental_mode">Mode</label>
          <select id="incremental_mode" name="incremental_mode">
            <option value="auto">auto</option>
            <option value="on">on</option>
            <option value="off">off</option>
          </select>
        </div>
        <div class="field">
          <label for="convergence_mode">Convergence mode</label>
          <select id="convergence_mode" name="convergence_mode">
            <option value="auto">track progress</option>
            <option value="on">require tracking</option>
            <option value="off">off</option>
          </select>
        </div>
      </details>

      <details class="advanced-options">
        <summary>Completion suggestions</summary>
        <label class="checkbox">
          <input name="completion_suggestions" type="checkbox" value="true">
          Generate draft/advisory patches
        </label>
        <input name="completion_suggestions" type="hidden" value="false">
        <div class="field">
          <label for="completion_mode">Mode</label>
          <select id="completion_mode" name="completion_mode">
            <option value="auto">auto</option>
            <option value="on">require safe patches</option>
            <option value="off">off</option>
          </select>
        </div>
        <div class="field">
          <label for="completion_template">Template</label>
          <select id="completion_template" name="completion_template">
            <option value="profile">selected profile</option>
            <option value="general">general</option>
            <option value="backend-api">backend-api</option>
            <option value="regulated-system">regulated-system</option>
            <option value="event-driven">event-driven</option>
          </select>
        </div>
        <div class="field">
          <label for="completion_max_patches">Max patches</label>
          <input id="completion_max_patches" name="completion_max_patches" type="number" min="0" max="50" step="1" value="8">
        </div>
      </details>

      <div class="controls">
        <div class="field">
          <label for="profile">Profile</label>
          <select id="profile" name="profile">
            <option value="general">general</option>
            <option value="backend-api">backend-api</option>
            <option value="regulated-system">regulated-system</option>
            <option value="event-driven">event-driven</option>
          </select>
        </div>

        <div class="field">
          <label for="severity_threshold">Severity</label>
          <select id="severity_threshold" name="severity_threshold">
            <option value="info">info</option>
            <option value="warn">warn</option>
            <option value="critical">critical</option>
          </select>
        </div>

        <label class="checkbox">
          <input name="strict" type="checkbox" value="true">
          Strict
        </label>

        <input name="preflight" type="hidden" value="false">
        <label class="checkbox">
          <input name="preflight" type="checkbox" value="true" checked>
          Preflight
        </label>
      </div>

      <button type="submit" data-running-label="Checking..." disabled>Check spec</button>
    </form>
  </section>

  <section class="result-pane" aria-label="Review result">
    <div id="status" aria-live="polite"></div>
    <div id="summary"></div>
    <div id="issues"></div>
    <div id="annotated-spec"></div>
  </section>

  <div id="issue-modal" class="modal-backdrop" data-modal hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="issue-modal-title">
      <button class="modal-close" type="button" data-modal-close>Close</button>
      <div id="issue-detail"></div>
    </section>
  </div>
</main>
{{ end }}
